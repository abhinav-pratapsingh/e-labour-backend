name: Keep Render Alive — Random Delay Ping

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wait random time and ping backend
        run: |
          MIN_DELAY=120
          MAX_DELAY=840
          RANGE=$((MAX_DELAY - MIN_DELAY + 1))
          DELAY=$(( RANDOM % RANGE + MIN_DELAY ))

          echo "Sleeping for $DELAY seconds..."
          sleep $DELAY

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "https://e-labour-backend.onrender.com/health")

          echo "Ping response: $STATUS"
